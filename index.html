<!DOCTYPE html>
<html>
<head>
<title>Habit Tracker</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#1e293b;
padding:30px;
border-radius:10px;
width:380px;
}

h2{
text-align:center;
}

input{
width:70%;
padding:10px;
border:none;
border-radius:6px;
}

button{
padding:10px;
border:none;
background:#22c55e;
color:white;
border-radius:6px;
cursor:pointer;
}

ul{
list-style:none;
padding:0;
margin-top:20px;
}

li{
background:#334155;
padding:10px;
margin-top:10px;
border-radius:6px;
display:flex;
justify-content:space-between;
align-items:center;
}

.done{
text-decoration:line-through;
color:#94a3b8;
}

.actions span{
margin-left:10px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>📅 Habit Tracker</h2>

<input id="habitInput" placeholder="New habit">
<button onclick="addHabit()">Add</button>

<ul id="habitList"></ul>

</div>

<script>

let habits = JSON.parse(localStorage.getItem("habits")) || []

function displayHabits(){

let list=document.getElementById("habitList")
list.innerHTML=""

habits.forEach((habit,index)=>{

let li=document.createElement("li")

li.innerHTML = `
<span class="${habit.done ? 'done':''}" onclick="toggleHabit(${index})">
${habit.name}
</span>

<div class="actions">
<span onclick="deleteHabit(${index})">❌</span>
</div>
`

list.appendChild(li)

})

localStorage.setItem("habits",JSON.stringify(habits))

}

function addHabit(){

let input=document.getElementById("habitInput")

if(input.value.trim()=="") return

habits.push({name:input.value,done:false})

input.value=""

displayHabits()

}

function toggleHabit(index){

habits[index].done=!habits[index].done

displayHabits()

}

function deleteHabit(index){

habits.splice(index,1)

displayHabits()

}

displayHabits()

</script>

</body>
</html>
